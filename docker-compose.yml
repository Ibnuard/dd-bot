# Doomsday Bot — Docker Compose configuration.
#
# Usage:
#   cp .env.example .env       # then edit .env
#   docker compose up -d       # start in background
#   docker compose logs -f     # follow logs
#   docker compose pull && docker compose up -d --build   # update

services:
  bot:
    container_name: doomsday-bot
    build: .
    restart: unless-stopped
    # Pass through all env vars defined in .env (TELEGRAM_BOT_TOKEN, ALLOWED_CHAT_IDS, etc.)
    env_file:
      - .env
    # Container-only env. Defined here (not in .env) on purpose: docker compose
    # auto-loads .env into its own process environment, which means putting
    # HTTPS_PROXY there would make buildkit honor the proxy and break image
    # pulls (host.docker.internal isn't resolvable during build).
    environment:
      - HTTPS_PROXY=socks5://host.docker.internal:40000
    # Resolve `host.docker.internal` to the host's gateway IP so the bot can
    # reach Cloudflare WARP (or any other proxy) running on the VPS.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # No `ports:` block — the bot is pure Telegram polling (outbound only),
    # so it doesn't need to expose any HTTP port on the host.
    # `init: true` runs an init system as PID 1 so SIGTERM is forwarded properly
    # and child processes (Telegram polling) don't become zombies on shutdown.
    init: true
    # Defensive resource cap — Telegram polling is light, but extraction can
    # spike memory if a page is huge. Tune if you see OOM kills.
    deploy:
      resources:
        limits:
          memory: 512M
